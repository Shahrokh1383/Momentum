<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#11998e">
    <title>Forgot Password - Momentum Habit Tracker</title>
    <link rel="icon" type="image/jpeg" href="./assets/assets/icon.jpg">

    <link rel="stylesheet" href="./assets/bootstrap-pack/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/FontAwesome/css/all.css">
    <link rel="stylesheet" href="./assets/css/app.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="auth-container glass-panel">
        <div class="text-center">
            <img src="./assets/assets/logo.jpg" alt="Momentum Logo" class="auth-logo">
            <h1 class="auth-title">Forgot Password?</h1>
            <p class="auth-subtitle">No worries. Enter your email and we will send you reset instructions.</p>
        </div>

        <!-- Dev Note as requested -->
        <div class="dev-note">
            <i class="fas fa-code mt-1"></i>
            <div>
                <strong>Developer Note:</strong><br>
                In this simulated environment, retrieve the reset token directly from the <code>sent_emails_log</code> database table.
            </div>
        </div>

        <form class="auth-form" id="forgot-password-form" novalidate>
            <div class="form-floating mb-4">
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                <label for="email">Email address</label>
            </div>

            <button type="submit" class="btn btn-momentum mb-3">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="./login.html"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
        </div>
    </div>

    <script src="./assets/bootstrap-pack/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/auth.js"></script>
</body>
</html>
