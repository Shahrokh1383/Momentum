<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#11998e">
    <title>Verify Email - Momentum Habit Tracker</title>
    <link rel="icon" type="image/jpeg" href="./assets/assets/icon.jpg">

    <link rel="stylesheet" href="./assets/bootstrap-pack/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/FontAwesome/css/all.css">
    <link rel="stylesheet" href="./assets/css/app.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="auth-container glass-panel text-center">
        <div class="verify-icon-wrapper">
            <i class="fas fa-envelope-open-text"></i>
        </div>
        
        <h1 class="auth-title">Verify Your Email</h1>
        <p class="auth-subtitle mb-4">
            We've sent a verification link to your email address. <br>
            Please check your inbox (and spam folder) to activate your account.
        </p>

        <div class="dev-note text-start">
            <i class="fas fa-code mt-1"></i>
            <div>
                <strong>Developer Note:</strong><br>
                Retrieve the verification token from the <code>sent_emails_log</code> table to simulate clicking the link.
            </div>
        </div>

        <button id="resend-btn" class="btn btn-momentum mb-3">
            Resend Verification Email
        </button>

        <div class="text-center mt-4">
            <span class="text-muted-custom">Want to use a different email? </span>
            <a href="./login.html">Go back to login</a>
        </div>
    </div>

    <script src="./assets/bootstrap-pack/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/auth.js"></script>
</body>
</html>
