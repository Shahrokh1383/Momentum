<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#11998e">
    <title>Reset Password - Momentum Habit Tracker</title>
    <link rel="icon" type="image/jpeg" href="./assets/assets/icon.jpg">

    <link rel="stylesheet" href="./assets/bootstrap-pack/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/FontAwesome/css/all.css">
    <link rel="stylesheet" href="./assets/css/app.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="auth-container glass-panel">
        <div class="text-center">
            <img src="./assets/assets/logo.jpg" alt="Momentum Logo" class="auth-logo">
            <h1 class="auth-title">Set New Password</h1>
            <p class="auth-subtitle">Create a strong password to secure your account.</p>
        </div>

        <form class="auth-form" id="reset-password-form" novalidate>
            <!-- Hidden input to simulate token presence from URL -->
            <input type="hidden" id="reset-token" name="token" value="simulated-token-123">

            <div class="form-floating mb-2 position-relative">
                <input type="password" class="form-control" id="password" name="password" placeholder="New Password" required>
                <label for="password">New Password</label>
                <button type="button" class="password-toggle-btn" data-target="password" aria-label="Toggle password visibility">
                    <i class="far fa-eye"></i>
                </button>
            </div>
            
            <div class="password-strength">
                <div class="password-strength-bar" id="strength-bar"></div>
            </div>
            <div class="strength-text mb-3" id="strength-text">Enter a password</div>

            <div class="form-floating mb-4 position-relative">
                <input type="password" class="form-control" id="password_confirmation" name="password_confirmation" placeholder="Confirm Password" required>
                <label for="password_confirmation">Confirm New Password</label>
                <button type="button" class="password-toggle-btn" data-target="password_confirmation" aria-label="Toggle password visibility">
                    <i class="far fa-eye"></i>
                </button>
            </div>

            <button type="submit" class="btn btn-momentum mb-3">
                Reset Password
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="./login.html"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
        </div>
    </div>

    <script src="./assets/bootstrap-pack/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/auth.js"></script>
</body>
</html>
