<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#11998e">
    <title>Register - Momentum Habit Tracker</title>
    <link rel="icon" type="image/jpeg" href="./assets/assets/icon.jpg">

    <link rel="stylesheet" href="./assets/bootstrap-pack/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/FontAwesome/css/all.css">
    <link rel="stylesheet" href="./assets/css/app.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="auth-container glass-panel">
        <div class="text-center">
            <img src="./assets/assets/logo.jpg" alt="Momentum Logo" class="auth-logo">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Start your journey to better habits today.</p>
        </div>

        <form class="auth-form" novalidate>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" name="name" placeholder="Full Name" required>
                <label for="name">Full Name</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                <label for="email">Email address</label>
            </div>
            
            <div class="form-floating mb-2 position-relative">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
                <button type="button" class="password-toggle-btn" data-target="password" aria-label="Toggle password visibility">
                    <i class="far fa-eye"></i>
                </button>
            </div>
            
            <!-- Password Strength Meter UI -->
            <div class="password-strength">
                <div class="password-strength-bar" id="strength-bar"></div>
            </div>
            <div class="strength-text" id="strength-text">Enter a password</div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password_confirmation" name="password_confirmation" placeholder="Confirm Password" required>
                <label for="password_confirmation">Confirm Password</label>
            </div>

            <button type="submit" class="btn btn-momentum mb-3">
                Create Account
            </button
        </form>

        <div class="oauth-divider">
            <span>Or sign up with</span>
        </div>

        <button class="btn-oauth">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="btn-oauth">
            <i class="fab fa-github"></i> GitHub
        </button>

        <div class="text-center mt-4">
            <span class="text-muted-custom">Already have an account? </span>
            <a href="./login.html">Sign in</a>
        </div>
    </div>

    <script src="./assets/bootstrap-pack/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/auth.js"></script>
</body>
</html>
