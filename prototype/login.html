<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#11998e">
    <title>Login - Momentum Habit Tracker</title>
    <link rel="icon" type="image/jpeg" href="./assets/assets/icon.jpg">

    <link rel="stylesheet" href="./assets/bootstrap-pack/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/FontAwesome/css/all.css">
    <link rel="stylesheet" href="./assets/css/app.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="auth-container glass-panel">
        <div class="text-center">
            <img src="./assets/assets/logo.jpg" alt="Momentum Logo" class="auth-logo">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue building your momentum.</p>
        </div>

        <form class="auth-form" novalidate>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                <label for="email">Email address</label>
            </div>
            
            <div class="form-floating mb-4 position-relative">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
                <button type="button" class="password-toggle-btn" data-target="password" aria-label="Toggle password visibility">
                    <i class="far fa-eye"></i>
                </button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input custom-checkbox" type="checkbox" id="remember" name="remember">
                    <label class="form-check-label text-muted-custom" for="remember" style="font-size: 0.9rem;">Remember me</label>
                </div>
                <a href="./forgot-password.html" style="font-size: 0.9rem;">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-momentum mb-3">
                Sign In
            </button>
        </form>

        <div class="oauth-divider">
            <span>Or continue with</span>
        </div>

        <button class="btn-oauth">
            <i class="fab fa-google"></i> Google
        </button>
        <button class="btn-oauth">
            <i class="fab fa-github"></i> GitHub
        </button>

        <div class="text-center mt-4">
            <span class="text-muted-custom">Don't have an account? </span>
            <a href="./register.html">Create one now</a>
        </div>
    </div>

    <script src="./assets/bootstrap-pack/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/auth.js"></script>
</body>
</html>
